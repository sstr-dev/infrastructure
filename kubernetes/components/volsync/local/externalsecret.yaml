---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: "${APP}-volsync"
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: "${APP}-volsync-secret"
    template:
      data:
        KOPIA_FS_PATH: /repository
        KOPIA_PASSWORD: "{{ .KOPIA_PASSWORD }}"
        KOPIA_REPOSITORY: filesystem:///repository

        #RESTIC_REPOSITORY: "{{ .REPOSITORY_TEMPLATE }}/${APP}"
        #RESTIC_PASSWORD: "${SECRET_RESTIC_PASSWORD}"
        #AWS_ACCESS_KEY_ID: "${SECRET_VOLSYNC_MINIO_ACCESS_KEY_ID}"
        #AWS_SECRET_ACCESS_KEY: "${SECRET_VOLSYNC_MINIO_SECRET_ACCESS_KEY}"

  dataFrom:
    - extract:
        key: ${CLUSTER}/volsync-template
