---
apiVersion: batch/v1
kind: Job
metadata:
  name: "${BOOTSTRAP_JOB:-${APP}-bootstrap}"
  labels:
    app.kubernetes.io/name: "${APP}"
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "${APP}"
    spec:
      restartPolicy: Never
      containers:
        - name: seed
          image: ${BOOTSTRAP_IMAGE:-busybox:1.37.0}
          command:
            - /bin/sh
            - -ec
            - |
              if [ "${BOOTSTRAP_DEBUG_START_SLEEP:-0}" != "0" ]; then
                echo "debug start sleep: ${BOOTSTRAP_DEBUG_START_SLEEP}s"
                sleep "${BOOTSTRAP_DEBUG_START_SLEEP:-0}"
              fi
              cp -av /source/. /target/
              echo "bootstrap completed"
              if [ "${BOOTSTRAP_DEBUG_END_SLEEP:-0}" != "0" ]; then
                echo "debug end sleep: ${BOOTSTRAP_DEBUG_END_SLEEP:-0}s"
                sleep "${BOOTSTRAP_DEBUG_END_SLEEP:-0}"
              fi
          volumeMounts:
            - name: source
              mountPath: /source
              readOnly: true
            - name: target
              mountPath: /target
      volumes:
        - name: source
          nfs:
            server: "${BOOTSTRAP_NFS_SERVER:-nas.main.internal}"
            path: "${BOOTSTRAP_NFS_PATH:-/mnt/user/legacy/${APP}}"
        - name: target
          persistentVolumeClaim:
            claimName: "${BOOTSTRAP_CLAIM:-${APP}}"
