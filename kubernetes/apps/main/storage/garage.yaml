---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app garage
spec:
  interval: 1h
  path: ./kubernetes/apps/base/storage/garage
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
  postBuild:
    substitute:
      APP: *app
      CLUSTER: ${CLUSTER}
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app garage-webui
spec:
  interval: 15m
  path: ./kubernetes/apps/base/storage/garage-webui
  components:
    - ../../../../components/envoy/ext-auth
    #- ../../../../components/envoy/oidc/authentik/internal
  postBuild:
    substitute:
      APP: *app
      CLUSTER: ${CLUSTER}
      #APP_UPPER: GARAGE_WEBUI
      #APP_SLUG: garage
      SUBDOMAIN: garage
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      #- kind: Secret
      #  name: cluster-secrets
  dependsOn:
    - name: garage
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false

