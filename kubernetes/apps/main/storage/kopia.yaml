---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app kopia
spec:
  components:
    - ../../../../components/nfs-scaler
    - ../../../../components/envoy/oidc/authentik/internal
  dependsOn:
    - name: volsync
  interval: 1h
  path: ./kubernetes/apps/base/storage/kopia
  postBuild:
    substitute:
      APP: *app
      APP_UPPER: KOPIA
      APP_SLUG: kopia
      CLUSTER: ${CLUSTER}
      SUBDOMAIN: kopia
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false

