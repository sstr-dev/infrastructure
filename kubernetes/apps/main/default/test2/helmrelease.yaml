---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app test2
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      *app :
        containers:
          app:
            image:
              repository: docker.io/library/busybox
              tag: 1.36
            command:
              - /bin/sh
              - -ec
              - |
                while true; do
                  sleep 30
                done
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 99
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch

    persistence:
      export:
        type: nfs
        server: nas.main.internal
        path: /mnt/user/main-backup/paperless-export
        advancedMounts:
          *app :
            app:
              - path: /data/nas/export
      consume:
        type: nfs
        server: nas.main.internal
        path: /data/user/data/dms_import
        advancedMounts:
          *app :
            app:
              - path: /data/nas/consume
      #data:
      #  enabled: true
      #  existingClaim: *app
      #  globalMounts:
      #    - path: /data
