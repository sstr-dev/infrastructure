---
# yaml-language-server: $schema=https://schemas.sstr.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway
spec:
  interval: 1h
  path: ./kubernetes/apps/base/network/envoy-gateway
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
---
# yaml-language-server: $schema=https://schemas.sstr.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-config
spec:
  dependsOn:
    - name: certificates-multi-domain-tls
    - name: envoy-gateway
  interval: 1h
  path: ./kubernetes/apps/${CLUSTER}/network/envoy-gateway
  postBuild:
    substitute:
      CLUSTER: ${CLUSTER}
      EXTERNAL_DOMAIN: external
      INTERNAL_DOMAIN: internal
      PUBLIC_DOMAIN: public
      REPLICAS: "2"
      SVC_GATEWAY_EXTERNAL: 10.0.69.55
      SVC_GATEWAY_PUBLIC: 10.0.69.56
      SVC_GATEWAY_INTERNAL: 10.0.60.55
    substituteFrom:
      #- kind: ConfigMap
      #  name: cluster-settings
      #- kind: Secret
      #  name: cluster-secrets
      - kind: Secret
        name: ns-network-secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
