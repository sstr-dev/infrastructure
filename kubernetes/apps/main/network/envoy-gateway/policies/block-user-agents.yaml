---
# yaml-language-server: $schema=https://schemas.sstr.dev/gateway.envoyproxy.io/envoyextensionpolicy_v1alpha1.json
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyExtensionPolicy
metadata:
  name: block-user-agents
spec:
  #targetSelectors:
  #  - group: gateway.networking.k8s.io
  #    kind: Gateway
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-public
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-external
  lua:
    - type: Inline
      # source for list: https://raw.githubusercontent.com/ai-robots-txt/ai.robots.txt/refs/heads/main/robots.txt
      # first half:
      # :%s/\nUser-agent:/,/g
      # second half:
      # :%s/, /*, \~*/g
      inline: |
        function envoy_on_request(request_handle)
          local ua = request_handle:headers():get("user-agent") or ""
          local blocked = {
            "AddSearchBot",
            "AI2Bot",
            "AI2Bot%-DeepResearchEval",
            "Ai2Bot%-Dolma",
            "aiHitBot",
            "amazon%-kendra",
            "Amazonbot",
            "AmazonBuyForMe",
            "Andibot",
            "Anomura",
            "anthropic%-ai",
            "Applebot",
            "Applebot%-Extended",
            "atlassian%-bot",
            "Awario",
            "bedrockbot",
            "bigsur%.ai",
            "Bravebot",
            "Brightbot 1%.0",
            "BuddyBot",
            "Bytespider",
            "CCBot",
            "Channel3Bot",
            "ChatGLM%-Spider",
            "ChatGPT Agent",
            "ChatGPT%-User",
            "Claude%-SearchBot",
            "Claude%-User",
            "Claude%-Web",
            "ClaudeBot",
            "Cloudflare%-AutoRAG",
            "CloudVertexBot",
            "cohere%-ai",
            "cohere%-training%-data%-crawler",
            "Cotoyogi",
            "Crawl4AI",
            "Crawlspace",
            "Datenbank Crawler",
            "DeepSeekBot",
            "Devin",
            "Diffbot",
            "DuckAssistBot",
            "Echobot Bot",
            "EchoboxBot",
            "FacebookBot",
            "facebookexternalhit",
            "Factset_spyderbot",
            "FirecrawlAgent",
            "FriendlyCrawler",
            "Gemini%-Deep%-Research",
            "Google%-CloudVertexBot",
            "Google%-Extended",
            "Google%-Firebase",
            "Google%-NotebookLM",
            "GoogleAgent%-Mariner",
            "GoogleOther",
            "GoogleOther%-Image",
            "GoogleOther%-Video",
            "GPTBot",
            "iAskBot",
            "iaskspider",
            "iaskspider/2%.0",
            "IbouBot",
            "ICC%-Crawler",
            "ImagesiftBot",
            "imageSpider",
            "img2dataset",
            "ISSCyberRiskCrawler",
            "Kangaroo Bot",
            "KlaviyoAIBot",
            "KunatoCrawler",
            "laion%-huggingface%-processor",
            "LAIONDownloader",
            "LCC",
            "LinerBot",
            "Linguee Bot",
            "LinkupBot",
            "Manus%-User",
            "meta%-externalagent",
            "meta%-externalfetcher",
            "meta%-webindexer",
            "MistralAI%-User",
            "MistralAI%-User/1%.0",
            "MyCentralAIScraperBot",
            "netEstate Imprint Crawler",
            "NotebookLM",
            "NovaAct",
            "OAI%-SearchBot",
            "omgili",
            "omgilibot",
            "OpenAI",
            "Operator",
            "PanguBot",
            "Panscient",
            "panscient%.com",
            "Perplexity%-User",
            "PerplexityBot",
            "PetalBot",
            "PhindBot",
            "Poggio%-Citations",
            "Poseidon Research Crawler",
            "QualifiedBot",
            "QuillBot",
            "quillbot%.com",
            "SBIntuitionsBot",
            "Scrapy",
            "SemrushBot%-OCOB",
            "SemrushBot%-SWA",
            "ShapBot",
            "Sidetrade indexer bot",
            "Spider",
            "TerraCotta",
            "Thinkbot",
            "TikTokSpider",
            "Timpibot",
            "TwinAgent",
            "VelenPublicWebCrawler",
            "WARDBot",
            "Webzio%-Extended",
            "wpbot",
            "WRTNBot",
            "YaK",
            "YandexAdditional",
            "YandexAdditionalBot",
            "YouBot",
            "ZanistaBot",
            "FediBigData"
          }
          for _, s in ipairs(blocked) do
            if string.match(string.lower(ua), string.lower(s)) then
              request_handle:respond({[":status"] = "403"}, "Forbidden")
              return
            end
          end
        end
