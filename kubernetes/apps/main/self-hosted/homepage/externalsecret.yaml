    #    key: ${CLUSTER}/prowlarr
    #  rewrite:
    #    - regexp:
    #        source: "(.*)"
    #        target: "prowlarr_$1"
    - extract:
        key: ${CLUSTER}/radarr
    - extract:
        key: ${CLUSTER}/sonarr
