---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app nextcloud
spec:
  interval: 1h
  path: ./kubernetes/apps/base/self-hosted/nextcloud
  components:
    - ../../../../components/dragonfly  # Redis cache (dragonfly-nextcloud)
    - ../../../../components/nfs-scaler  # Scale down on NFS mount issues
    - ../../../../components/vol/nfs
    - ../../../../components/vol/nfs/two
  #healthCheckExprs:
  #  - apiVersion: dragonflydb.io/v1alpha1
  #    kind: Dragonfly
  #    failed: status.phase != 'ready'
  #    current: status.phase == 'ready'
  postBuild:
    substitute:
      APP: *app
      PUID: "99"
      PGID: "100"
      DRAGONFLY_REQUESTS_MEMORY: 256Mi
      CLUSTER: ${CLUSTER}
      GATEWAY: envoy-public
      CLAIM: nextcloud-config
      VOL_CAPACITY: 2Gi
      NFS_SUBFOLDER: nextcloud/config
      CLAIM_2: nextcloud-data
      VOL_CAPACITY_2: 1T
      NFS_SUBFOLDER_2: nextcloud/user-data
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false

---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app nextcloud-collabora
spec:
  #dependsOn:
  #  - name: nextcloud
  interval: 1h
  path: ./kubernetes/apps/base/self-hosted/nextcloud-collabora
  postBuild:
    substitute:
      APP: *app
      CLUSTER: ${CLUSTER}
      GATEWAY: envoy-public
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: self-hosted
  wait: false

