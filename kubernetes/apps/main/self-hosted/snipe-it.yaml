---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app snipe-it
spec:
  interval: 1h
  path: ./kubernetes/apps/base/self-hosted/snipe-it
  components:
    - ../../../../components/vol/base
  postBuild:
    substitute:
      APP: *app
      REPLICAS: "1"
      # APP_UID: "1000"
      # APP_GID: "1000"
      VOL_CAPACITY: 1Gi
      VOL_STORAGECLASS: nfs-retain
      VOL_ACCESSMODES: ReadWriteMany
      VOL_RESOURCEPOLICY: keep
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
  dependsOn:
    - name: mariadb
      namespace: database
    - name: external-secrets
      namespace: external-secrets
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: false
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app mealie
spec:
  interval: 1h
  path: ./kubernetes/apps/base/self-hosted/mealie
  #path: ./kubernetes/apps/base/migration/common
  components:
    - ../../../../components/vol/base
    #- ../../../../components/volmigrate/nfs
  postBuild:
    substitute:
      APP: *app
      REPLICAS: "1"
      # APP_UID: "1000"
      # APP_GID: "1000"
      VOL_CAPACITY: 5Gi
      VOL_STORAGECLASS: nfs-retain
      VOL_ACCESSMODES: ReadWriteMany
      VOL_RESOURCEPOLICY: keep
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
  dependsOn:
    - name: cloudnative-pg-cluster
      namespace: database
    - name: external-secrets
      namespace: external-secrets
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: false
