---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-prometheus-stack
spec:
  interval: 1h
  path: ./kubernetes/apps/base/observability/kube-prometheus-stack
  #components:
  #  - ../../../../components/ext-auth
  #  - ../../../../components/ext-auth/two
  postBuild:
    substitute:
      ALERTMANAGER_SUBDOMAIN: alertmanager
      CLUSTER: ${CLUSTER}
      PVC_CAPACITY: "75"
      STORAGECLASS: local-hostpath
      SUBDOMAIN: prometheus
      GATEWAY: "envoy-internal"
      # INGRESSCLASS: iot-nginx
      #EXT_AUTH_TARGET: kube-prometheus-stack-prometheus
      #EXT_AUTH_TARGET_2: kube-prometheus-stack-alertmanager
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      #- kind: Secret
      #  name: cluster-secrets
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: false
