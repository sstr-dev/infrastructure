---
# yaml-language-server: $schema=https://schemas.sstr.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: unpoller
spec:
  interval: 1h
  path: ./kubernetes/apps/base/observability/exporters/unpoller
  prune: true
  retryInterval: 2m
  postBuild:
    substitute:
      CLUSTER: ${CLUSTER}
      GATEWAY: "envoy-internal"
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: false
