---
# yaml-language-server: $schema=https://schemas.sstr.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app dozzle
spec:
  interval: 1h
  path: ./kubernetes/apps/base/observability/dozzle
  postBuild:
    substitute:
      APP: *app
      #APP_UPPER: DOZZLE
      #APP_SLUG: dozzle
      CLUSTER: ${CLUSTER}
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      #- kind: Secret
      #  name: cluster-secrets
  components:
    #- ../../../../components/envoy/oidc/authentik/internal
    - ../../../../components/envoy/ext-auth
  prune: true
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: false

