---
# yaml-language-server: $schema=https://schemas.sstr.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app karma
spec:
  interval: 1h
  path: ./kubernetes/apps/base/observability/karma
  postBuild:
    substitute:
      APP: *app
      CLUSTER: ${CLUSTER}
      GATEWAY: "envoy-internal"
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
