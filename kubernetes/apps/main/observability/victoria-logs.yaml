---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app victoria-logs
spec:
  interval: 1h
  path: ./kubernetes/apps/base/observability/victoria-logs
  components:
    #- ../../../../components/envoy/oidc/authentik/internal
    - ../../../../components/ext-auth
  prune: true
  postBuild:
    substitute:
      APP: *app
      #APP_UPPER: VICTORIA_LOGS
      #APP_SLUG: victoria-logs
      CLUSTER: ${CLUSTER}
      SUBDOMAIN: victoria-logs
      EXT_AUTH_TARGET: victoria-logs-server
      GATEWAY: "envoy-internal"
      # STORAGECLASS
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      #- kind: Secret
      #  name: cluster-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
