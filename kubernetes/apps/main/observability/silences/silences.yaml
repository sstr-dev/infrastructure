---
# yaml-language-server: $schema=https://schemas.sstr.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: keda-hpa-maxed-out
spec:
  matchers:
    - name: alertname
      value: KubeHpaMaxedOut
    - name: horizontalpodautoscaler
      value: keda-hpa-.*
      matchType: "=~"
---
# yaml-language-server: $schema=https://schemas.sstr.dev/observability.giantswarm.io/silence_v1alpha2.json
apiVersion: observability.giantswarm.io/v1alpha2
kind: Silence
metadata:
  name: cpu-throttling-kyoo-front
  namespace: observability
spec:
  matchers:
    - name: alertname
      value: CPUThrottlingHigh
    - name: pod
      value: kyoo-front.*
      matchType: "=~"
