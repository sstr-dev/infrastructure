---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app jellyfin
spec:
  interval: 1h
  path: ./kubernetes/apps/base/media/jellyfin
  postBuild:
    substitute:
      APP: *app
      REPLICAS: "1"
      CLUSTER: ${CLUSTER}
      GATEWAY: envoy-external
      LB_SERVICE_IP: 10.0.69.60
      LB_SERVICE_SEGMENT: services
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: false

