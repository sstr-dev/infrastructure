---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg-cluster-timescale
spec:
  interval: 1h
  path: ./kubernetes/apps/${CLUSTER}/database/cloudnative-pg/timescale
  postBuild:
    substitute:
      LB_SERVICE_IP: 10.0.60.57
      LB_SERVICE_SEGMENT: servers
      CNPG_STORAGECLASS: local-hostpath
      CNPG_REPLICAS: '3'
      CNPG_SIZE: 5Gi
      CNPG_REQUESTS_MEMORY: 1Gi
      CNPG_LIMITS_MEMORY: 2Gi
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: ns-database-secret
  dependsOn:
    - name: cloudnative-pg
    - name: cloudnative-pg-barman-cloud
    - name: openebs
      namespace: storage
  healthCheckExprs:
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      failed: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'False')
      current: status.conditions.filter(e, e.type == 'Ready').all(e, e.status == 'True')
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cnpg-timescale-backup
spec:
  dependsOn:
    - name: cloudnative-pg-cluster-timescale
  path: ./kubernetes/apps/${CLUSTER}/database/cloudnative-pg/timescale/backup
  prune: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
  interval: 1h
  retryInterval: 2m
  timeout: 5m
