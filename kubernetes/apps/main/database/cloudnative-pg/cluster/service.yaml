---
apiVersion: v1
kind: Service
metadata:
  name: postgres-lb
  labels:
    cnpg.io/cluster: postgres
    network.l2.cilium/segment: ${LB_SERVICE_SEGMENT}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: postgres.${DOMAIN}
    io.cilium/lb-ipam-ips: ${LB_SERVICE_IP}
    gatus.home-operations.com/endpoint: |-
      group: Database
spec:
  type: LoadBalancer
  ports:
    - name: postgres
      port: 5432
      protocol: TCP
      targetPort: 5432
  selector:
    cnpg.io/cluster: postgres
    cnpg.io/instanceRole: primary
