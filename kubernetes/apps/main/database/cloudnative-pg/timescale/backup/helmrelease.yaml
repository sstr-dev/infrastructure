---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-timescale-backup
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      cnpg-backup:
        type: cronjob
        cronjob:
          schedule: "@daily"
          concurrencyPolicy: Forbid
          successfulJobsHistory: 1
          failedJobsHistory: 1
        containers:
          app:
            image:
              repository: ghcr.io/sstr-dev/backup-local
              tag: 18@sha256:72e17efe98a8e6ea46dbbe5158a638e7b47913f313af3316051468c75ba1027f
            command: ["/bin/bash", "/backup.sh"]
            env:
              TZ: ${CLUSTER_TIMEZONE}
              EXCLUDE_DBS: app
              DB_TYPE: postgres
              POSTGRES_EXTRA_OPTS: "--blobs --clean --create --compress=9"
              BACKUP_DIR: /backups/database/postgresql-timescale
              BACKUP_KEEP_DAYS: "7"
              BACKUP_KEEP_WEEKS: "4"
              BACKUP_KEEP_MONTHS: "6"
              BACKUP_LATEST_TYPE: none
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 99
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    persistence:
      nas:
        type: nfs
        server: nas.main.internal
        path: /mnt/user/main-backup
        globalMounts:
          - path: /backups
