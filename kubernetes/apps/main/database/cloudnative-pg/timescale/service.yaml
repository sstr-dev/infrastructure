---
apiVersion: v1
kind: Service
metadata:
  name: postgres-timescale-lb
  labels:
    network.l2.cilium/segment: ${LB_SERVICE_SEGMENT}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: postgres-timescale.${DOMAIN}
    io.cilium/lb-ipam-ips: ${LB_SERVICE_IP}
    gatus.home-operations.com/endpoint: |-
      group: Database
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  ports:
    - name: postgres-timescale
      port: 5432
      protocol: TCP
      targetPort: 5432
  selector:
    cnpg.io/cluster: postgres-timescale
    cnpg.io/instanceRole: primary
