---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app dbgate
spec:
  interval: 1h
  path: ./kubernetes/apps/base/database/dbgate
  prune: true
  postBuild:
    substitute:
      APP: *app
      APP_UPPER: DBGATE
      APP_SLUG: dbgate
      CLUSTER: ${CLUSTER}
      VOL_STORAGECLASS: nfs-retain
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      #- kind: Secret
      #  name: cluster-secrets
  components:
    #- ../../../../components/envoy/oidc/authentik/internal
    - ../../../../components/ext-auth
  retryInterval: 2m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
  wait: false
