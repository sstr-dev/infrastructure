---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dragonfly-operator
spec:
  interval: 1h
  path: ./kubernetes/apps/base/database/dragonfly/operator
  prune: true
  postBuild:
    substitute:
      CLUSTER: ${CLUSTER}
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dragonfly-cluster
spec:
  dependsOn:
    - name: dragonfly-operator
  healthCheckExprs:
    - apiVersion: dragonflydb.io/v1alpha1
      kind: Dragonfly
      current: status.phase == 'Ready' || status.phase == 'ready'
      failed:  status.phase == 'Failed' || status.phase == 'failed'
  path: ./kubernetes/apps/${CLUSTER}/database/dragonfly/cluster
  prune: true
  postBuild:
    substitute:
      CLUSTER: ${CLUSTER}
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: true
  interval: 1h
  retryInterval: 2m
  timeout: 5m
