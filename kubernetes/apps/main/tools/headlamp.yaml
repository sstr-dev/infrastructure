---
# yaml-language-server: $schema=https://schemas.sstr.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app headlamp
spec:
  interval: 1h
  path: ./kubernetes/apps/base/tools/headlamp
  prune: true
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
  postBuild:
    substitute:
      APP: *app
      CLUSTER: ${CLUSTER}
      SUBDOMAIN: headlamp
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
