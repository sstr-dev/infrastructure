---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app open-webui
spec:
  path: ./kubernetes/apps/base/llm/open-webui
  #path: ./kubernetes/apps/base/migration/common
  #components:
    #- ../../../../components/volsync
    #- ../../../../components/volmigrate/nfs
  postBuild:
    substitute:
      APP: *app
      # APP_UID: "1000"
      # APP_GID: "1000"
      CLUSTER: ${CLUSTER}
      GATEWAY: "envoy-external"
      VOL_CAPACITY: 2Gi
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
  prune: true
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
