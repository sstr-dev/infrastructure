# TODO: volsync, depends_on
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app open-webui
spec:
  path: ./kubernetes/apps/base/llm/open-webui
  components:
    - ../../../../components/vol
  postBuild:
    substitute:
      APP: *app
      # APP_UID: "1000"
      # APP_GID: "1000"
      GATEWAY: "envoy-external"
      VOL_CAPACITY: 5Gi
      VOL_STORAGECLASS: sc-standard
      VOL_ACCESSMODES: ReadWriteMany
      VOL_RESOURCEPOLICY: keep
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
  dependsOn:
    - name: external-secrets
      namespace: security
    - name: postgres-llm
    - name: dragonfly-llm
  prune: true
  interval: 1h
  retryInterval: 2m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
