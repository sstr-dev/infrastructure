---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system-grafanadashboards
spec:
  interval: 1h
  path: ./kubernetes/apps/base/flux-system/grafanadashboards
  prune: true
  retryInterval: 2m
  dependsOn:
    - name: grafana
      namespace: observability
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  timeout: 5m
