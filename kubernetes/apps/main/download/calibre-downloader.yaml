---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app calibre-downloader
spec:
  components:
    - ../../../../components/envoy/oidc/authentik/main
  interval: 1h
  path: ./kubernetes/apps/base/download/calibre-downloader
  postBuild:
    substitute:
      APP: *app
      APP_UPPER: CALIBRE_DOWNLOADER
      APP_SLUG: calibre-downloader
      CLUSTER: ${CLUSTER}
      GATEWAY: envoy-external
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false

