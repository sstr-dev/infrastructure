---
# yaml-language-server: $schema=https://schemas.sstr.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app n8n
spec:
  components:
    - ../../../../components/volsync
    #- ../../../../components/volmigrate/nfs
  interval: 1h
  path: ./kubernetes/apps/base/automation/n8n
  #path: ./kubernetes/apps/base/migration/common
  dependsOn:
    - name: volsync
      namespace: storage
  postBuild:
    substitute:
      APP: *app
      CLUSTER: ${CLUSTER}
      VOLSYNC_CAPACITY: 1Gi
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false

