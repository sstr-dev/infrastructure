---
# yaml-language-server: $schema=https://schemas.sstr.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app filaman
spec:
  interval: 1h
  path: ./kubernetes/apps/base/maker/filaman
  postBuild:
    substitute:
      APP: *app
      CLUSTER: ${CLUSTER}
      SUBDOMAIN: filaman
      VOL_STORAGECLASS: nfs-retain
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false

