---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app spoolman
spec:
  interval: 1h
  path: ./kubernetes/apps/base/maker/spoolman
  components:
    - ../../../../components/envoy/basic
  postBuild:
    substitute:
      APP: *app
      CLUSTER: ${CLUSTER}
      SUBDOMAIN: spoolman
      BASIC_AUTH_SECRET_KEY: SPOOLMAN_BASIC_AUTH
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false

