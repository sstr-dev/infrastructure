---
# yaml-language-server: $schema=https://schemas.sstr.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: renovate-operator
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 4.6.0
  url: oci://ghcr.io/mogenius/helm-charts/renovate-operator
---
# yaml-language-server: $schema=https://schemas.sstr.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: renovate-operator
spec:
  chartRef:
    kind: OCIRepository
    name: renovate-operator
  interval: 30m
  values:
    fullnameOverride: renovate-operator
    config:
      defaultJobBackoffLimit: 5
      defaultJobActiveDeadlineSeconds: 3600
    route:
      enabled: true
      annotations:
        gethomepage.dev/enabled: 'true'
        gethomepage.dev/group: Infrastructure
        gethomepage.dev/name: Renovate Operator
        gethomepage.dev/icon: renovate.svg
        gethomepage.dev/pod-selector: app=renovate-operator
      hostnames:
        - renovate.${DOMAIN}
      parentRefs:
        - name: envoy-internal
          namespace: network
    webhook:
      enabled: true
      ## cluster-secret (dev-domain?), webhook auth?
      #route:
      #  enabled: true
      #  hostnames:
      #    - "renovate-webhook.${SECRET_DOMAIN}"
      #  annotations:
      #    gatus.home-operations.com/endpoint: |-
      #      conditions: ["[STATUS] == 401"]
      #  parentRefs:
      #    - name: envoy-external
      #      namespace: network
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      dashboard:
        enabled: true
        grafanaDashboard:
          allowCrossNamespaceImport: true
          instanceSelector:
            matchLabels:
              grafana.internal/instance: grafana
    # docs: https://github.com/mogenius/renovate-operator/blob/main/docs/auth.md
    auth:
      oidc:
        enabled: true
        #issuerUrl:
        #clientId: 'your-client-id'
        existingSecret: renovate-operator-secret
        secretKey: RENOVATE_OPERATOR_CLIENT_SECRET
        sessionSecretKey: RENOVATE_OPERATOR_SESSION_SECRET
        redirectUrl: https://renovate.${DOMAIN}/auth/callback
  valuesFrom:
    - targetPath: auth.oidc.clientId
      kind: Secret
      name: renovate-operator-secret
      valuesKey: RENOVATE_OPERATOR_CLIENT_ID
    - targetPath: auth.oidc.issuerUrl
      kind: Secret
      name: renovate-operator-secret
      valuesKey: RENOVATE_OPERATOR_OIDC_ISSUER

