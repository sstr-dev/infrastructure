---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./externalsecret.yaml
  - ./helmrelease.yaml
configMapGenerator:
  - name: publish-k8s-schemas
    files:
      - generate-index.sh=./resources/generate-index.sh
      - index.html=./resources/index.html
      - index.md=./resources/index.md
      - push-crds.sh=./resources/push-crds.sh
generatorOptions:
  disableNameSuffixHash: true
  annotations:
    kustomize.toolkit.fluxcd.io/substitute: disabled
