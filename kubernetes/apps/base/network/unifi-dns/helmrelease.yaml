---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: unifi-dns
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 1.20.0
  url: oci://ghcr.io/home-operations/charts-mirror/external-dns
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name:  &app unifi-dns
spec:
  chartRef:
    kind: OCIRepository
    name: unifi-dns
  dependsOn: []
  interval: 15m
  values:
    fullnameOverride: *app
    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/kashalls/external-dns-unifi-webhook
          tag: v0.8.1@sha256:e9b7bf621768c490110fb154c94a4f610f254c9f0c540140ea429c601a8475dd
        env:
          - name: &name UNIFI_HOST
            valueFrom:
              secretKeyRef:
                name: *app
                key: *name
          - name: &name UNIFI_API_KEY
            valueFrom:
              secretKeyRef:
                name: *app
                key: *name
          - name: SERVER_HOST
            value: 0.0.0.0
          - name: DRY_RUN
            value: "true"
        securityContext:
          readOnlyRootFilesystem: true
        livenessProbe:
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
    triggerLoopOnEvent: true
    policy: sync
    #extraArgs:
    #  - --ingress-class=internal
    #  - --ingress-class=home
    #  - --managed-record-types=A
    #  #- --managed-record-types=AAAA
    #  - --managed-record-types=CNAME
    #  #- --managed-record-types=TXT
    #  #- --managed-record-types=SRV
    registry: txt
    sources:
      #- crd
      #- ingress
      - gateway-httproute
      #- gateway-tlsroute
      - service

    txtOwnerId: ${CLUSTER}
    txtPrefix: k8s.${CLUSTER}.
    domainFilters:
      - landomain
      - int_ext

    serviceMonitor:
      enabled: true
    podAnnotations:
      secret.reloader.stakater.com/reload: *app
