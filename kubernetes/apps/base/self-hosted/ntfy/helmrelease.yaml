---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ntfy
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      ntfy:
        type: deployment
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            runAsNonRoot: true
            runAsUser: 99
            runAsGroup: 100
            fsGroup: 100
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: binwiederhier/ntfy
              tag: v2.22.0
            args: ["serve"]
            env:
              TZ: ${CLUSTER_TIMEZONE}
              # General
              NTFY_BEHIND_PROXY: "true"
              NTFY_BASE_URL: https://ntfy.${SECRET_MAIN_DOMAIN_NAME}
              AAA_HTTP: &port 8080
              NTFY_LISTEN_HTTP: ":$(AAA_HTTP)"
              NTFY_LOG_LEVEL: INFO
              # Email
              NTFY_SMTP_SENDER_ADDR: "smtp-relay.network.svc.cluster.local:25"
              NTFY_SMTP_SENDER_FROM: "Notify <${SECRET_SMTP_FROM_FULL}>"
              # Users
              NTFY_AUTH_DEFAULT_ACCESS: "deny-all"
              NTFY_ENABLE_LOGIN: "true"
              NTFY_REQUIRE_LOGIN: "true"
              # Cache
              NTFY_CACHE_DURATION: "24h"
              #NTFY_CACHE_FILE: "/data/cache.db"
              NTFY_ATTACHMENT_CACHE_DIR: "/data/attachments"
            envFrom:
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 100Mi
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                  - ALL
              readOnlyRootFilesystem: true

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "ntfy.${SECRET_MAIN_DOMAIN_NAME}"
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port

    persistence:
      data:
        type: nfs
        server: nas.main.internal
        path: /mnt/user/applications/ntfy
        globalMounts:
          - path: /data
            readOnly: false
