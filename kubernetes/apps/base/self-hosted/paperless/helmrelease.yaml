# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app paperless
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    #defaultPodOptions:
    #  dnsConfig:
    #    options:
    #      - name: ndots
    #        value: "1"
    controllers:
      *app :
        labels:
          nfsMount: "true"
          postgres: "true"
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/paperless-ngx/paperless-ngx
              tag: 2.20.14
            env:
              # Application
              PAPERLESS_URL: https://dms.${SECRET_MAIN_DOMAIN_NAME}
              PAPERLESS_PORT: &port "8000"
              PAPERLESS_TIME_ZONE: ${CLUSTER_TIMEZONE}

              PAPERLESS_WEBSERVER_WORKERS: "2"
              PAPERLESS_TASK_WORKERS: "2"
              # Folder Importer
              PAPERLESS_CONSUMER_POLLING: "60"
              PAPERLESS_CONSUMER_RECURSIVE: "true"
              PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: "true"
              PAPERLESS_CONSUMER_DELETE_DUPLICATES: "true"
              # Database
              PAPERLESS_DBENGINE: postgresql
              PAPERLESS_DBPORT: "5432"
              PAPERLESS_DBNAME: *app
              PAPERLESS_DBHOST: postgres-rw.database.svc.cluster.local
              PAPERLESS_DBUSER: *app
              # Folders
              #PAPERLESS_CONSUMPTION_DIR: /data/df/incoming
              #PAPERLESS_DATA_DIR: /data/local/data
              #PAPERLESS_EXPORT_DIR: /data/df/export
              #PAPERLESS_MEDIA_ROOT: /data/local/media
              PAPERLESS_CONSUMPTION_DIR: /data/nas/consume
              PAPERLESS_DATA_DIR: /data/nas/data
              PAPERLESS_EXPORT_DIR: /data/nas/export
              PAPERLESS_MEDIA_ROOT: /data/nas/media
              # OCR
              PAPERLESS_OCR_LANGUAGES: deu+eng
              PAPERLESS_OCR_LANGUAGE: deu
              # Configure format
              # https://paperless-ngx.readthedocs.io/en/latest/advanced_usage.html#advanced-file-name-handling
              #PAPERLESS_FILENAME_FORMAT: "{created_year}/{correspondent}/{title}"
              #PAPERLESS_FILENAME_FORMAT: "{{ created_year }}/{{ correspondent }}/{{ title }}" # {created_year}/{correspondent}/{title}
              PAPERLESS_FILENAME_FORMAT: "{{ `{{ created_year }}/{{ correspondent }}/{{ title }}` }}"
              #PAPERLESS_FILENAME_FORMAT: "{{ created_year }}/{{ correspondent }}/{{ title }}" # {created_year}/{correspondent}/{title}
              # Configure tika and gotenberg (optional integrations)
              PAPERLESS_TIKA_ENABLED: 1
              PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg.self-hosted.svc.cluster.local:3000
              PAPERLESS_TIKA_ENDPOINT: http://tika.self-hosted.svc.cluster.local:9998
              # Configure redis integration
              #PAPERLESS_REDIS: redis://dragonfly-cluster.database.svc.cluster.local:6379/1
              # PAPERLESS_REDIS: redis://paperless-redis.self-hosted.svc.cluster.local:6379
              # Configure user permissions
              USERMAP_UID: 99
              USERMAP_GID: 100
              # Configure SSO
              PAPERLESS_APPS: allauth.socialaccount.providers.openid_connect
              PAPERLESS_ACCOUNT_ALLOW_SIGNUPS: 'false'
              PAPERLESS_SOCIALACCOUNT_ALLOW_SIGNUPS: 'true'
              PAPERLESS_DISABLE_REGULAR_LOGIN: 'true'
              PAPERLESS_OCR_USER_ARGS: '{"invalidate_digital_signatures": true}'
              TRIGGER_UPDATE: 1

            envFrom:
              - secretRef:
                  name: *app
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            resources:
              requests:
                cpu: 100m
                memory: 768Mi
              limits:
                memory: 2Gi
      #redis:
      #  containers:
      #    redis:
      #      image:
      #        repository: ghcr.io/valkey-io/valkey
      #        tag: 9.0.2
      #      resources:
      #        requests:
      #          cpu: 5m
      #          memory: 32Mi
      #        limits:
      #          memory: 128Mi
    service:
      app:
        primary: true
        controller: *app
        ports:
          http:
            port: *port
      #redis:
      #  controller: redis
      #  ports:
      #    http:
      #      port: 6379
    route:
      app:
        hostnames:
          - "dms.${SECRET_MAIN_DOMAIN_NAME}"
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        annotations:
          #gethomepage.dev/enabled: "true"
          #gethomepage.dev/group: Home
          #gethomepage.dev/name: Paperless
          #gethomepage.dev/icon: paperless-ngx.png
          #gethomepage.dev/description: Document OCR Software
          #gethomepage.dev/widget.type: paperlessngx
          #gethomepage.dev/widget.url: "http://{{ .Release.Name }}.{{ .Release.Namespace }}:8000"
          #gethomepage.dev/widget.key: "{{ `{{HOMEPAGE_VAR_PAPERLESS_TOKEN}}` }}"
        rules:
          - backendRefs:
              - identifier: app
                port: http

    persistence:
      # data to pvc
      # media and consume to data nfs
      # export nfs backup
      data:
        type: persistentVolumeClaim
        storageClass: ${VOL_STORAGECLASS:=nfs-retain}
        accessMode: ReadWriteOnce
        size: 1Gi
        advancedMounts:
          *app :
            app:
              - path: /data/nas/data
      media:
        type: nfs
        server: nas.main.internal
        path: /mnt/user/data/paperless/media
        advancedMounts:
          *app :
            app:
              - path: /data/nas/media
      #  python3 /usr/src/paperless/src/manage.py document_exporter /data/nas/export --compare-checksums --delete --use-filename-format --use-folder-prefix
      #  python3 /usr/src/paperless/src/manage.py document_exporter /data/df/export --compare-checksums --delete --use-filename-format --use-folder-prefix
      export:
        type: nfs
        server: nas.main.internal
        path: /mnt/user/main-backup/paperless-export
        advancedMounts:
          *app :
            app:
              - path: /data/nas/export
      consume:
        type: nfs
        server: nas.main.internal
        path: /mnt/user/data/dms_import
        advancedMounts:
          *app :
            app:
              - path: /data/nas/consume


