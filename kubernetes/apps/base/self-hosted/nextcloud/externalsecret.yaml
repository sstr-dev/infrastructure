
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: nextcloud
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: nextcloud-secret
    template:
      data:
        # App
        ADMIN_USER: "{{ .NEXTCLOUD_ADMIN_USER }}"
        ADMIN_PASS: "{{ .NEXTCLOUD_ADMIN_PASSWORD }}"

        REDIS_HOST: "{{ .NEXTCLOUD_REDIS_HOST }}"
        REDIS_HOST_PORT: "{{ .NEXTCLOUD_REDIS_HOST_PORT }}"
        # Email
        SMTP_USERNAME: ""
        SMTP_PASSWORD: ""
        SMTP_HOST: smtp-relay.network.svc.cluster.local
        # Database
        POSTGRES_HOST: "{{ .NEXTCLOUD_POSTGRES_HOST }}"
        POSTGRES_USER: "{{ .NEXTCLOUD_POSTGRES_USER }}"
        POSTGRES_PASSWORD: "{{ .NEXTCLOUD_POSTGRES_PASSWORD }}"
        POSTGRES_DB: "{{ .NEXTCLOUD_POSTGRES_DB }}"
        # OIDC
        OIDC_CLIENT_ID: "{{ .NEXTCLOUD_CLIENT_ID }}"
        OIDC_CLIENT_SECRET: "{{ .NEXTCLOUD_CLIENT_SECRET }}"
        OIDC_ISSUER: "{{ .NEXTCLOUD_OIDC_ISSUER }}"
  dataFrom:
    - extract:
        key: ${CLUSTER}/nextcloud
