---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: nextcloud
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 9.0.5
  url: oci://ghcr.io/nextcloud/helm/nextcloud
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nextcloud
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: nextcloud
  values:
    podAnnotations:
      reloader.stakater.com/search: "true"

    image:
      flavor: fpm-alpine

    nginx:
      enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 96Mi
        limits:
          memory: 192Mi
    nextcloud:
      host: ${SECRET_CLOUD_DOMAIN}
      datadir: /var/www/data

      extraInitContainers:
        # create empty redis file for nextcloud entrypoint to override it
        - name: init-redis-session-ini
          image: busybox
          command: ['touch', '/usr/local/etc/php/conf.d/redis-session.ini']
          volumeMounts:
            - name: nextcloud-redis-session-ini
              mountPath: "/usr/local/etc/php/conf.d"
      extraVolumes:
      - name: nextcloud-redis-session-ini
        emptyDir: {}
      extraVolumeMounts:
      - name: nextcloud-redis-session-ini
        mountPath: "/usr/local/etc/php/conf.d/redis-session.ini" # fix permission denied error
        subPath: redis-session.ini

      #extraVolumes:
      #  - name: php-confd
      #    emptyDir: {}
      #  - name: tmpfs
      #    emptyDir: {}
      #extraVolumeMounts:
      #  - name: php-confd
      #    mountPath: "/usr/local/etc/php/conf.d/redis-session.ini"
      #    subPath: redis-session.ini
      #  - name: tmpfs
      #    mountPath: "/tmp"
      #extraInitContainers:
      #  - name: init-redis-session-ini
      #    image: mirror.gcr.io/alpine:latest
      #    command: ['touch', '/usr/local/etc/php/conf.d/redis-session.ini']
      #    volumeMounts:
      #      - name: php-confd
      #        mountPath: "/usr/local/etc/php/conf.d"

      # Security context
      securityContext:
        runAsUser: ${PUID:-1000}
        runAsGroup: ${PGID:-100}
        fsGroup: ${PGID:-100}
        #runAsUser: 33
        #runAsGroup: 33
        #fsGroup: 33
        fsGroupChangePolicy: "OnRootMismatch"
        runAsNonRoot: true
        #runAsNonRoot: true
        #readOnlyRootFilesystem: false

      # Admin credentials and SMTP from ExternalSecret
      existingSecret:
        enabled: true
        secretName: &secret nextcloud-secret
        usernameKey: ADMIN_USER
        passwordKey: ADMIN_PASS
        smtpHostKey: SMTP_HOST
        smtpUsernameKey: SMTP_USERNAME
        smtpPasswordKey: SMTP_PASSWORD
      # SMTP configuration
      mail:
        enabled: true
        fromAddress: nextcloud
        domain: ${SECRET_CLOUD_DOMAIN}
        smtp:
          port: 25
          secure: NONE
          authtype: NONE

      # Environment variables
      extraEnv:
        # Redis connection (Dragonfly)
        - name: REDIS_HOST
          valueFrom:
            secretKeyRef:
              name: *secret
              key: REDIS_HOST
        - name: REDIS_HOST_PORT
          valueFrom:
            secretKeyRef:
              name: *secret
              key: REDIS_HOST_PORT
        # OIDC credentials (for PHP config below)
        - name: OIDC_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: *secret
              key: OIDC_CLIENT_ID
        - name: OIDC_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: *secret
              key: OIDC_CLIENT_SECRET
        - name: OIDC_ISSUER
          valueFrom:
            secretKeyRef:
              name: *secret
              key: OIDC_ISSUER
        ## Database password from CNPG secret (for sync hook)
        #- name: POSTGRES_PASSWORD
        #  valueFrom:
        #    secretKeyRef:
        #      name: *secret
        #      key: POSTGRES_PASSWORD



      defaultConfigs:
        redis.config.php: false
      # PHP configuration files
      configs:
        # General settings, Proxy and trusted domains
        local.config.php: |-
          <?php
          $CONFIG = array (
            'trusted_domains' =>
              [
                'nextcloud',
                '${SECRET_CLOUD_DOMAIN}',
                '${SECRET_CLOUD_TALK_DOMAIN}',
                '${SECRET_CLOUD_COLLABORA_DOMAIN}'
              ],
            'trusted_proxies' => array(
              0 => '127.0.0.1',
              1 => '10.42.0.0/16',
              2 => '10.43.0.0/16',
            ),
            'forwarded_for_headers' => array('HTTP_X_FORWARDED_FOR'),
            'default_phone_region' => 'DE',
            'overwrite.cli.url' => 'https://${SECRET_CLOUD_DOMAIN}',
            'overwriteprotocol' => 'https',
            'quota_include_external_storage' => 'false',
            'check_data_directory_permissions' => false,
            'skeletondirectory' => '',
            'knowledgebaseenabled' => 'false',
            'maintenance_window_start' => '1',
            'enable_previews' => false,
            'trashbin_retention_obligation' => 'auto, 30',
            'auth.bruteforce.protection.enabled' => true,
          );

        redis.config.php: |-
          <?php
          $CONFIG = array(
            'memcache.distributed' => '\OC\Memcache\Redis',
            'memcache.locking' => '\OC\Memcache\Redis',
            'redis' => array(
              'host' => getenv('REDIS_HOST'),
              'port' => getenv('REDIS_HOST_PORT') ?: 6379,
              'dbindex' => getenv('REDIS_DATABASE') ?: 0,
              'password' => getenv('REDIS_PASSWORD'),
            ),
          );

        # OIDC - Authentik integration
        sso.config.php: |-
          <?php
          $CONFIG = array (
            'allow_user_to_change_display_name' => false,
            'lost_password_link' => 'disabled',
            'oidc_login_provider_url' => getenv('OIDC_ISSUER'),
            'oidc_login_client_id' => getenv('OIDC_CLIENT_ID'),
            'oidc_login_client_secret' => getenv('OIDC_CLIENT_SECRET'),
            'oidc_login_auto_redirect' => false,
            'oidc_login_end_session_redirect' => true,
            'oidc_login_button_text' => 'Log in with Authentik',
            'oidc_login_hide_password_form' => true,
            'oidc_login_use_id_token' => false,
            'oidc_login_attributes' => array(
              'id' => 'preferred_username',
              'name' => 'name',
              'mail' => 'email',
              'groups' => 'groups',
              'is_admin' => 'homelab-admins',
            ),
            'oidc_login_scope' => 'openid profile email groups',
            'oidc_login_default_group' => 'oidc',
            'oidc_login_use_external_storage' => false,
            'oidc_login_proxy_ldap' => false,
            'oidc_login_disable_registration' => false,
            'oidc_login_redir_fallback' => false,
            'oidc_login_tls_verify' => true,
            'oidc_create_groups' => false,
            'oidc_login_webdav_enabled' => true,
            'oidc_login_password_authentication' => false,
            'oidc_login_public_key_caching_time' => 86400,
            'oidc_login_update_avatar' => false,
          );

        # Collabora Online (Richdocuments)
        collabora.config.php: |-
          <?php
          $CONFIG = array (
            'richdocuments' => array(
              'wopi_url' => 'https://${SECRET_CLOUD_COLLABORA_DOMAIN}',
            ),
          );

        # Notify Push - high performance notifications
        #notify_push.config.php: |-
        #  <?php
        #  $CONFIG = array (
        #    'notify_push' => array(
        #      'base_endpoint' => 'https://${SECRET_CLOUD_DOMAIN}/push',
        #    ),
        #  );

        # TODO Nextcloud Talk - signaling server and TURN
        # talk.config.php: |-






      # PHP settings
      phpConfigs:
        uploadLimit.ini: |
          upload_max_filesize = 16G
          post_max_size = 16G
          max_input_time = 3600
          max_execution_time = 3600
          memory_limit = 512M
        #www.conf: |
        #  [www]
        #  user = www-data
        #  group = www-data
        #  listen = 127.0.0.1:9000
        #  pm = dynamic
        #  pm.max_children = 57
        #  pm.start_servers = 14
        #  pm.min_spare_servers = 14
        #  pm.max_spare_servers = 42
        #  pm.max_requests = 500
        #  pm.process_idle_timeout = 10s

      # Sidecar: Notify Push (high-performance notifications)
      #extraSidecarContainers:
      #  - name: notify-push
      #    image: nextcloud:33.0.1-fpm-alpine
      #    command:
      #      - /var/www/html/custom_apps/notify_push/bin/x86_64/notify_push
      #      - /var/www/html/config/config.php
      #    args:
      #      - --port
      #      - "7867"
      #    env:
      #      - name: NEXTCLOUD_URL
      #        value: http://localhost:8080
      #      - name: PORT
      #        value: "7867"
      #    ports:
      #      - name: push
      #        containerPort: 7867
      #        protocol: TCP
      #    resources:
      #      requests:
      #        cpu: 10m
      #        memory: 96Mi
      #      limits:
      #        memory: 192Mi
      #    volumeMounts:
      #      - name: nextcloud-main
      #        mountPath: /var/www/html
      #        readOnly: true
      #      - name: nextcloud-data
      #        mountPath: /var/www/data
      #        readOnly: true

    # Database - CloudNative-PG (auto-generated secret)
    internalDatabase:
      enabled: false

    externalDatabase:
      enabled: true
      type: postgresql
      existingSecret:
        enabled: true
        secretName: *secret
        hostKey: POSTGRES_HOST
        databaseKey: POSTGRES_DB
        usernameKey: POSTGRES_USER
        passwordKey: POSTGRES_PASSWORD


    # Storage
    persistence:
      enabled: true
      existingClaim: nextcloud-config
      nextcloudData:
        enabled: true
        existingClaim: nextcloud-data  # NFS (user files)
        accessMode: ReadWriteMany

    # Ingress - disabled (using Gateway API HTTPRoute)
    ingress:
      enabled: false

    # this seems to be required for nextcloud initialization which takes a long time
    startupProbe:
      enabled: true
      initialDelaySeconds: 10
      periodSeconds: 20
      timeoutSeconds: 5
      failureThreshold: 30
      successThreshold: 1

    # Resources
    resources:
      requests:
        cpu: 60m
        memory: 256Mi
      limits:
        memory: 512Mi

    # Cronjob for background tasks
    cronjob:
      enabled: true
      resources:
        requests:
          cpu: 10m
          memory: 96Mi
        limits:
          memory: 192Mi


    # Extra manifests
    #extraManifests:
    #  # Service for notify_push sidecar
    #  - |
    #    apiVersion: v1
    #    kind: Service
    #    metadata:
    #      name: nextcloud-push
    #      labels:
    #        app.kubernetes.io/name: {{ include "nextcloud.name" . }}
    #        app.kubernetes.io/instance: {{ .Release.Name }}
    #    spec:
    #      type: ClusterIP
    #      ports:
    #        - name: push
    #          port: 7867
    #          targetPort: 7867
    #          protocol: TCP
    #      selector:
    #        app.kubernetes.io/name: {{ include "nextcloud.name" . }}
    #        app.kubernetes.io/instance: {{ .Release.Name }}

    # Disable unused components
    redis:
      enabled: false
    postgresql:
      enabled: false

