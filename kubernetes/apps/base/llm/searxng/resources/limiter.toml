[botdetection]
ipv4_prefix = 32
ipv6_prefix = 48

# Only set trusted proxies if your gateway really forwards X-Forwarded-For / X-Real-IP.
trusted_proxies = [
  '10.0.60.0/24', # IPv4 private network
  '10.42.0.0/16',
]

[botdetection.ip_limit]
# On a private instance, local/private client IPs should not be rate-limited.
# This also avoids false 429s if the gateway/proxy IP is seen upstream.
filter_link_local = false
link_token = false

[botdetection.ip_lists]
block_ip = []

# Keep this empty for now, otherwise the proxy/node IP bypasses the limiter.
pass_ip = []

# Activate passlist of (hardcoded) IPs from the SearXNG organization,
# e.g. `check.searx.space`.
pass_searxng_org = false
