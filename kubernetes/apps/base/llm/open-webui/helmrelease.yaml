---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app open-webui
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  dependsOn: []
  interval: 15m
  values:
    defaultPodOptions:
      dnsConfig:
        options:
          - name: ndots
            value: "1"
    controllers:
      open-webui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/open-webui/open-webui
              tag: v0.8.12@sha256:8113fa5510020ef05a44afc0c42d33eabeeb2524a996e3e3fb8c437c00f0d792
            env:
              # https://docs.openwebui.com/getting-started/env-configuration
              TZ: ${CLUSTER_TIMEZONE}
              # App
              WEBUI_URL: https://chat.${SECRET_DOMAIN}
              CORS_ALLOW_ORIGIN: https://chat.${SECRET_DOMAIN}
              DEFAULT_LOCALE: de
              ENABLE_OPENAI_API: False
              ENABLE_OLLAMA_API: True
              ENABLE_WEB_SEARCH: True
              ENABLE_SEARCH_QUERY_GENERATION: True
              ENABLE_PERSISTENT_CONFIG: True
              WEBUI_SESSION_COOKIE_SAME_SITE: lax
              WEBUI_SESSION_COOKIE_SECURE: True
              # Searx
              WEB_SEARCH_ENGINE: searxng
              SEARXNG_QUERY_URL: http://searxng.llm.svc.cluster.local:8080/search?q=<query>
              # Redis
              ENABLE_WEBSOCKET_SUPPORT: True
              WEBSOCKET_MANAGER: redis
              # Ollama
              OLLAMA_BASE_URL: http://vision-01.main.internal:11434
              # OIDC
              ENABLE_OAUTH_SIGNUP: True
              OAUTH_MERGE_ACCOUNTS_BY_EMAIL: True
              OAUTH_UPDATE_PICTURE_ON_LOGIN: True
              OAUTH_SCOPES: "openid profile email groups"
              ENABLE_OAUTH_ROLE_MANAGEMENT: "true"
              ENABLE_OAUTH_GROUP_MANAGEMENT: "true"
              ENABLE_OAUTH_GROUP_CREATION: "true"
              OAUTH_ALLOWED_ROLES: "chat-users, homelab-admins"
              OAUTH_ADMIN_ROLES: "homelab-admins"
              OAUTH_ROLES_CLAIM: "groups"
              DEFAULT_USER_ROLE: "user"
              ENABLE_LOGIN_FORM: "false"
              # Image Generation
              #ENABLE_IMAGE_GENERATION: True
              #IMAGE_GENERATION_ENGINE: automatic1111
              #IMAGE_GENERATION_MODEL: dreamshaper_8
              #IMAGE_SIZE: 400x400
              #IMAGE_STEPS: 8
              #AUTOMATIC1111_BASE_URL: http://sdnext:7860/
              #AUTOMATIC1111_CFG_SCALE: 2
              #AUTOMATIC1111_SAMPLER: DPM++ SDE
              #AUTOMATIC1111_SCHEDULER: Karras
            envFrom:
              - secretRef:
                  name: open-webui-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 100Mi
              limits:
                memory: 2000Mi
        #pod:
        #  securityContext:
        #    runAsNonRoot: true
        #    runAsUser: 99
        #    runAsGroup: 100
        #    fsGroup: 100
        #    fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: 8080
    route:
      app:
        hostnames:
          - "chat.${SECRET_DOMAIN}"
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/description: Interact with your AI models
          gethomepage.dev/group: LLM/Ai
          gethomepage.dev/icon: sh-open-webui.svg
          gethomepage.dev/name: Open WebUI
          gethomepage.dev/app: open-webui
          gatus.home-operations.com/endpoint: |-
            conditions: ["[STATUS] == 200"]
        parentRefs:
          - name: ${GATEWAY:=envoy-internal}
            namespace: network
            sectionName: https
    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        storageClass: ${VOL_STORAGECLASS:=longhorn}
        accessMode: ReadWriteOnce
        size: ${VOL_CAPACITY:=1Gi}
        globalMounts:
          - path: /app/backend/data
