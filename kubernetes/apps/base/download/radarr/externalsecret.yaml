---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: radarr
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: radarr-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        RADARR__AUTH__APIKEY  : "{{ .RADARR_APIKEY }}"
        RADARR__POSTGRES__HOST: "{{ .RADARR_POSTGRES_HOST }}"
        RADARR__POSTGRES__PORT: "5432"
        RADARR__POSTGRES__USER: "{{ .RADARR_POSTGRES_USER }}"
        RADARR__POSTGRES__PASSWORD: "{{ .RADARR_POSTGRES_PASSWORD }}"
        RADARR__POSTGRES__MAINDB: "{{ .RADARR_POSTGRES_DB }}"
  dataFrom:
    - extract:
        key: ${CLUSTER}/radarr

