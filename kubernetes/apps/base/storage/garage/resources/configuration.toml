metadata_dir = "/mnt//meta"
data_dir = "/mnt//data"
db_engine = "lmdb"
metadata_auto_snapshot_interval = "6h"

replication_factor = 1
compression_level = 2

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"

[s3_api]
s3_region = "homelab"
api_bind_addr = "[::]:3900"
root_domain = ".${SECRET_S3_DOMAIN}"

[s3_web]
bind_addr = "[::]:3902"
root_domain = ".${SECRET_S3_WEB_DOMAIN}"
index = "index.html"

[admin]
api_bind_addr = "[::]:3903"
