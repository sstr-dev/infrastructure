# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app garage
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
    namespace: flux-system
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      garage:
        strategy: RollingUpdate
        replicas: 1
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: dxflrs/garage
              tag: v2.2.0@sha256:45a61ce3f7c9c24fc23d9ed2b09b27ed560ab87b34605d175d5c588f539c24e4
            envFrom:
              - secretRef:
                  name: garage-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop: ["ALL"]
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
    service:
      app:
        ports:
          s3:
            port: &s3-port 3900
          web:
            port: &web-port 3902
          api:
            port: 3903
    route:
      app:
        hostnames: ["${SECRET_S3_DOMAIN}", "*.${SECRET_S3_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: gateway
        rules:
          - backendRefs:
              - name: *app
                port: *s3-port
      web:
        enabled: true
        hostnames: ["*.web.${SECRET_S3_WEB_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: gateway
        rules:
          - backendRefs:
              - identifier: app
                port: *web-port

    persistence:
      data:
        type: nfs
        server: nas.main.internal
        path: /mnt/s3/main/data
        globalMounts:
          - path: /mnt/data
            readOnly: false
      meta:
        type: nfs
        server: nas.main.internal
        path: /mnt/s3/main/meta
        globalMounts:
          - path: /mnt/meta
            readOnly: false
      config:
        type: configMap
        name: garage-configmap
        globalMounts:
          - path: /etc/garage.toml
            subPath: configuration.toml
            readOnly: true
