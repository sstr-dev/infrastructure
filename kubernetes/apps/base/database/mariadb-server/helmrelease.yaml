---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mariadb
spec:
  chartRef:
    kind: OCIRepository
    name: app-template
  interval: 1h
  values:
    controllers:
      mariadb:
        containers:
          app:
            image:
              repository: ghcr.io/linuxserver/mariadb
              tag: 11.4.9@sha256:8ea7a10e36dfe229cd4f91a12fb2c8ac40bd0c4b2276e472de8f7835aa360fcd
            env:
              TZ: ${CLUSTER_TIMEZONE:=Etc/UTC}
              PUID: "${APP_UID}"
              PGID: "${APP_GID}"
              MYSQL_LOG_CONSOLE: "false"
              MARIADB_HEALTHCHECK_USE_PASSWORD: "false" # local without password
            envFrom:
              - secretRef:
                  name: mariadb-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/bash
                      - /scripts/check.sh
                  failureThreshold: 3
                  initialDelaySeconds: 120
                  periodSeconds: 10
                  successThreshold: 1
                  timeoutSeconds: 1
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command:
                      - /bin/bash
                      - /scripts/check.sh
                  failureThreshold: 3
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  successThreshold: 1
                  timeoutSeconds: 1
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 512Mi
    service:
      app:
        controller: mariadb
        type: LoadBalancer
        externalTrafficPolicy: Cluster
        # ipFamilyPolicy: PreferDualStack
        labels:
          network.l2.cilium/segment: ${LB_SERVICE_SEGMENT}
        annotations:
          external-dns.alpha.kubernetes.io/hostname: mariadb.${DOMAIN}
          io.cilium/lb-ipam-ips: ${LB_SERVICE_IP}
          gatus.home-operations.com/endpoint: |-
            group: Database
        ports:
          mysql:
            port: 3306
            primary: true
    persistence:
      config:
        existingClaim: mariadb
      scripts:
        type: configMap
        name: mariadb-check
