---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app dbgate
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      dbgate:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: dbgate/dbgate
              tag: 7.1.10-alpine
            #env:
            #  #TZ: ${CLUSTER_TIMEZONE}
            #  LOGIN:
            #   valueFrom:
            #     secretKeyRef:
            #       name: dbgate-secret
            #       key: user
            #  PASSWORD:
            #   valueFrom:
            #     secretKeyRef:
            #       name: dbgate-secret
            #       key: password
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 3000
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 100m
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }

    #defaultPodOptions:
    #  dnsConfig:
    #    options:
    #      - name: ndots
    #        value: "1"
      #securityContext:
      #  runAsUser: 99
      #  runAsGroup: 100
      #  fsGroup: 100
      #  runAsNonRoot: true
      #  fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: dbgate
        ports:
          http:
            port: *port

    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${DOMAIN}"
        parentRefs:
          - name: ${GATEWAY:=envoy-internal}
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *port

    persistence:
      config:
        type: persistentVolumeClaim
        storageClass: ${VOL_STORAGECLASS:=sc-standard}
        accessMode: ReadWriteMany
        size: 1Gi
        globalMounts:
          - path: /root/.dbgate
            readOnly: false
