---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/source.toolkit.fluxcd.io/ocirepository_v1beta2.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: authentik
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 2026.2.1
  url: oci://ghcr.io/goauthentik/helm-charts/authentik
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: authentik
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      podAnnotations:
        secret.reloader.stakater.com/reload: authentik-secret
      deploymentStrategy:
        type: RollingUpdate
      envFrom:
        - secretRef:
            name: authentik-secret
    authentik:
      # -- whether to create the authentik configuration secret
      enabled: true
      #error_reporting:
      #  enabled: true
      #  environment: home
      #  send_pii: true
      #  sentry_dsn: https://xxxxxx@sentry.${SECRET_DOMAIN}/3
      #  sample_rate: 0.5
      #postgresql:
      #  host: pg-cluster-postgresql.database.svc.cluster.local
      #  user: file:///postgres-creds/username
      #  password: file:///postgres-creds/password
      #email:
      #  from: "${SECRETv_SMTP_FROM_FULL}"
      #  host: smtp-relay.default.svc.cluster.local
      #  port: 25
      #  use_tls: false
      #redis:
      #  host: dragonfly-authentik
      disable_update_check: true
      disable_startup_analytics: true
    server:
      autoscaling: &autoscaling
        enabled: true
        minReplicas: 1
        maxReplicas: 5
        targetCPUUtilizationPercentage: 60
        behavior:
          scaleUp:
            stabilizationWindowSeconds: 300
          scaleDown:
            stabilizationWindowSeconds: 300
      resources:
        requests:
          cpu: 300m
        limits:
          memory: 1Gi
      metrics:
         # -- deploy metrics service
        enabled: true
        serviceMonitor:
          # -- enable a prometheus ServiceMonitor
          enabled: true
      route:
        main:
          enabled: true
          hostnames:
            - ${SECRET_SSO_DOMAIN}
            - ${SECRET_SSO_DOMAIN_2}
          annotations:
            gatus.home-operations.com/enabled: "false"
          # external-dns.alpha.kubernetes.io/target: sso.${SECRET_DOMAIN}
          parentRefs:
            - name: envoy-external
              namespace: network
              sectionName: https

    worker:
      autoscaling: *autoscaling
      resources:
        requests:
          cpu: 300m
        limits:
          memory: 1Gi
      metrics:
         # -- deploy metrics service
        enabled: true
        serviceMonitor:
          # -- enable a prometheus ServiceMonitor
          enabled: true
