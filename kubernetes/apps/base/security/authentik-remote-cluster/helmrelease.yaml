---
# yaml-language-server: $schema=https://schemas.sstr.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: authentik-remote-cluster
spec:
  interval: 5m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 2.1.0
  url: oci://ghcr.io/goauthentik/helm-charts/authentik-remote-cluster
---
# yaml-language-server: $schema=https://schemas.sstr.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik-remote-cluster
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: authentik-remote-cluster
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    global:
      namespaceOverride: security
    serviceAccountSecret:
      enabled: true
    clusterRole:
      enabled: true
