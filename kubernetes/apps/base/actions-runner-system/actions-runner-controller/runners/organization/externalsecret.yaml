---
# yaml-language-server: $schema=https://schemas.sstr.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ${APP}
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: ${APP}-secret
    template:
      data:
        github_app_id: '{{ .${AUTHKEY}_github_app_id }}'
        github_app_installation_id: '{{ .${AUTHKEY}_github_app_installation_id }}'
        github_app_private_key: '{{ .${AUTHKEY}_github_app_private_key }}'
  dataFrom:
    - extract:
        key: ${CLUSTER}/actions-runner-controller
