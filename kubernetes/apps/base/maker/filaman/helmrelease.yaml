---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app filaman
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      filaman:
        replicas: ${REPLICAS:=1}
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/fire-devils/filaman-system
              tag: v1.2.30
            env:
              TZ: ${CLUSTER_TIMEZONE}
            envFrom:
              - secretRef:
                  name: filaman-secret
            #probes:
            #  liveness:
            #    enabled: true
            #  readiness:
            #    enabled: true
            #  startup:
            #    enabled: true
            #    spec:
            #      failureThreshold: 30
            #      periodSeconds: 5
            resources:
              requests:
                cpu: 25m
                memory: 256Mi

    service:
      app:
        controller: *app
        ports:
          http:
            port: 8000

    
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: ${GATEWAY:=envoy-external}
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: http
        annotations:
          gatus.home-operations.com/enabled: "false"
          gatus.home-operations.com/endpoint: |
            group: Maker
            conditions: ["[STATUS] == 401"]

    persistence:
      data:
        type: persistentVolumeClaim
        storageClass: ${VOL_STORAGECLASS:=sc-standard}
        accessMode: ReadWriteMany
        size: 1Gi
        globalMounts:
          - path: /app/data
            readOnly: false