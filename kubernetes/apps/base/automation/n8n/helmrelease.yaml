---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app n8n
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:

    defaultPodOptions:
      #annotations:
      #  setDownloadGateway: "true"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    controllers:
      n8n:
        replicas: ${REPLICAS:=1}
        annotations:
          reloader.stakater.com/auto: "true"
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/n8n-io/n8n
              # renovate: datasource=github-releases depName=n8n-io/n8n
              tag: 2.15.0
              pullPolicy: IfNotPresent
            env:
              #===CORE SETTINGS===
              N8N_PERSONALIZATION_ENABLED: true
              N8N_VERSION_NOTIFICATIONS_ENABLED: false
              N8N_TEMPLATES_ENABLED: true
              GENERIC_TIMEZONE: ${CLUSTER_TIMEZONE}
              N8N_HIRING_BANNER_ENABLED: false
              N8N_USER_MANAGEMENT_DISABLED: false
              N8N_MFA_ENABLED: "false"
              N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: false
              #===NETWORK & URL CONFIGURATION===
              N8N_PROTOCOL: "https"
              N8N_PORT: &port 8080
              N8N_HOST: &hostName "{{ .Release.Name }}.${SECRET_MAIN_DOMAIN_NAME}"
              N8N_PROXY_HOPS: "1"
              #WEBHOOK_URL: https://${SECRET_N8NWEBHOOKS_DOMAIN}/
              #===API CONFIGURATION===
              N8N_PUBLIC_API_DISABLED: true
              N8N_PUBLIC_API_SWAGGERUI_DISABLED: true
              #===LOGGING & DIAGNOSTICS===
              N8N_LOG_LEVEL: info
              N8N_LOG_OUTPUT: console
              N8N_DIAGONISTICS_ENABLED: false
              N8N_METRICS: true
              #===EXECUTION & DATA MANAGEMENT===
              EXECUTIONS_DATA_PRUNE: true
              EXECUTIONS_DATA_MAX_AGE: 7
              N8N_RUNNERS_ENABLED: "true"
              #===COMMUNITY PACKAGES & EXTENSIONS===
              N8N_COMMUNITY_PACKAGES_ALLOW_TOOL_USAGE: "true"
              NODE_FUNCTION_ALLOW_BUILTIN: "*"
              #===SMTP CONFIGURATION===
              N8N_SMTP_HOST: smtp-relay.network.svc.cluster.local
              N8N_SMTP_PORT: 25
              N8N_EMAIL_MODE: smtp
              N8N_SMTP_SENDER: "N8N <${SECRET_SMTP_FROM_FULL}>"
              N8N_SMTP_SSL: "false"
              #NODE_FUNCTION_ALLOW_EXTERNAL: databricks/sql
            envFrom:
              - secretRef:
                  name: *app
            probes:
              startup: &probeBase
                enabled: true
                custom: true
                spec:
                  httpGet: &httpGet
                    path: /healthz
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 5
                  timeoutSeconds: 3
                  failureThreshold: 30
              liveness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                <<: *probeBase
                spec:
                  httpGet: *httpGet
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 5m
                memory: 128Mi
              limits:
                memory: 2Gi

    service:
      app:
        controller: *app
        ports:
          http:
            port: *port


    route:
      app:
        hostnames:
          - *hostName
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        annotations:
          gatus.home-operations.com/enabled: "false"
        #annotations:
        #  gethomepage.dev/enabled: "true"
        #  gethomepage.dev/description: Flexible AI workflow automation
        #  gethomepage.dev/group: Home
        #  gethomepage.dev/icon: *app
        #  gethomepage.dev/name: *app
        #  gethomepage.dev/weight: "1" # optional
        #  gethomepage.dev/pod-selector: "app.kubernetes.io/name=n8n,app.kubernetes.io/controller=n8n"
        rules:
          - backendRefs:
              - identifier: app
                port: *port

      webhooks:
        hostnames:
          - ${SECRET_N8NWEBHOOKS_DOMAIN}
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        annotations:
          gatus.home-operations.com/enabled: "false"
        rules:
          - matches:
              - path:
                  value: /webhook
              - path:
                  value: /webhook-test
            backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        existingClaim: n8n
        advancedMounts:
          n8n:
            app:
              - path: /home/node/.n8n

