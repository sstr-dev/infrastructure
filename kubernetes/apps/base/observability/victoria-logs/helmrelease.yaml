---
# yaml-language-server: $schema=https://schemas.sstr.dev/source.toolkit.fluxcd.io/ocirepository_v1.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: victoria-logs
spec:
  interval: 15m
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  ref:
    tag: 0.12.1
  url: oci://ghcr.io/victoriametrics/helm-charts/victoria-logs-single
---
# yaml-language-server: $schema=https://schemas.sstr.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
spec:
  chartRef:
    kind: OCIRepository
    name: victoria-logs
  interval: 1h
  values:
    fullnameOverride: victoria-logs
    server:
      persistentVolume:
        enabled: true
        size: 20Gi
        storageClassName: ${STORAGECLASS:=local-hostpath}
      route:
        enabled: true
        hostnames:
          - ${SUBDOMAIN:=victoria-logs}.${DOMAIN}
        parentRefs:
          - name: ${GATEWAY:=envoy-internal}
            namespace: network
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Observability
          gethomepage.dev/name: VictoriaLogs
          gethomepage.dev/icon: si-victoriametrics
          gethomepage.dev/description: System & Application Logs
          gethomepage.dev/pod-selector: app.kubernetes.io/instance=victoria-logs
          # gethomepage.dev/siteMonitor: http://victoria-logs-server.observability.svc.cluster.local:9428/health
        extraRules:
          - filters:
              - type: RequestRedirect
                requestRedirect:
                  path:
                    type: ReplaceFullPath
                    replaceFullPath: /select/vmui/
                  statusCode: 302
            matches:
              - path:
                  type: Exact
                  value: /
      serviceMonitor:
        enabled: true
      retentionPeriod: 14d
    dashboards:
      enabled: true
