---
# yaml-language-server: $schema=https://schemas.sstr.dev/grafana.integreatly.org/grafana_v1beta1.json
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  labels:
    dashboards: grafana
    grafana.internal/instance: grafana
spec:
  config:
    analytics:
      check_for_updates: "false"
      check_for_plugin_updates: "false"
      feedback_links_enabled: "false"
      reporting_enabled: "false"
    database:
      type: postgres
    auth:
      signout_redirect_url: https://${SECRET_SSO_DOMAIN}/application/o/grafana/end-session/
      oauth_auto_login: "false"
      oauth_allow_insecure_email_lookup: "true"
    auth.anonymous:
      enabled: 'false'
      #enabled: "true"
      #org_name: Main Org.
      #org_role: Viewer
      hide_version: "true"
    auth.generic_oauth:
      name: authentik
      enabled: "true"
      scopes: openid email profile
      auth_url: https://${SECRET_SSO_DOMAIN}/application/o/authorize/
      token_url: https://${SECRET_SSO_DOMAIN}/application/o/token/
      api_url: https://${SECRET_SSO_DOMAIN}/application/o/userinfo/
      # Optionally map user groups to Grafana roles
      role_attribute_path: contains(groups, 'grafana-admin') && 'Admin' || contains(groups, 'grafana-editor') && 'Editor' || 'Viewer'
    log:
      mode: console
    metrics:
      enabled: "true"
    news:
      news_feed_enabled: "false"
    plugins:
      plugin_admin_enabled: "false"
      # preinstall_sync: "fetzerch-sunandmoon-datasource,victoriametrics-logs-datasource,victoriametrics-metrics-datasource"
    security:
      angular_support_enabled: "true"
    server:
      enable_gzip: "true"
      root_url: https://${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}
  deployment:
    spec:
      strategy:
        type: Recreate
      template:
        spec:
          containers:
            - name: grafana
              env:
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: GF_SECURITY_ADMIN_PASSWORD
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
                - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
                - name: GF_DATABASE_SSL_MODE
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: GF_DATABASE_SSL_MODE

                - name: GF_DATABASE_NAME
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: GF_DATABASE_NAME
                - name: GF_DATABASE_HOST
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: GF_DATABASE_HOST
                - name: GF_DATABASE_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: GF_DATABASE_USER
                - name: GF_DATABASE_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-secret
                      key: GF_DATABASE_PASSWORD
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities: {drop: ["ALL"]}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
          #volumes:
          #  - name: grafana-data
          #    persistentVolumeClaim:
          #      claimName: grafana-pvc
  httpRoute:
    metadata:
      annotations:
        gethomepage.dev/enabled: 'true'
        gethomepage.dev/group: Observability
        gethomepage.dev/name: Grafana
        gethomepage.dev/icon: grafana.svg
        gethomepage.dev/pod-selector: "app=grafana"
        gethomepage.dev/description: Grafana dashboard
    spec:
      hostnames:
        - ${GATUS_SUBDOMAIN}.${SECRET_DOMAIN}
      parentRefs:
        - name: envoy-external
          namespace: network
      rules:
        - backendRefs:
            - name: grafana-service
              port: 3000

  #persistentVolumeClaim:
  #  spec:
  #    accessModes:
  #      - ReadWriteOnce
  #    resources:
  #      requests:
  #        storage: 10Gi
  disableDefaultSecurityContext: All
