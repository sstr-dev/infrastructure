---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: grafana-secret
    template:
      data:
        # Authentik
        GF_AUTH_GENERIC_OAUTH_CLIENT_ID: "{{ .GRAFANA_OIDC_CLIENT_ID }}"
        GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET: "{{ .GRAFANA_OIDC_CLIENT_SECRET }}"
        # Admin User
        GF_SECURITY_ADMIN_USER: "{{ .GRAFANA_ADMIN_USER }}"
        GF_SECURITY_ADMIN_PASSWORD: "{{ .GRAFANA_ADMIN_PASS }}"
        # DB
        #TESLAMATE_DB_PASSWORD: "{{ .TESLAMATE_POSTGRES_PASS }}" # from teslamate
        #TESLAMATE_DB_USER: "{{ .TESLAMATE_POSTGRES_USER }}"
        # Influx
        # remove influx dependecy
        #INFLUX_GRAFANA_TOKEN: "{{ .INFLUX_GRAFANA_TOKEN }}"
        # Grafana DB
        GF_DATABASE_NAME: grafana
        #GF_DATABASE_HOST: postgres-observability-rw.observability.svc.cluster.local:5432
        GF_DATABASE_HOST: postgres-observability-rw.observability.svc:5432
        GF_DATABASE_USER: "{{ .GRAFANA_POSTGRES_USER }}"
        GF_DATABASE_PASSWORD: "{{ .GRAFANA_POSTGRES_PASS }}"
        GF_DATABASE_SSL_MODE: disable
        GF_DATABASE_TYPE: postgres
  dataFrom:
    - extract:
        key: ${CLUSTER}/grafana
    #- extract:
    #    key: ${CLUSTER}/teslamate
    #- extract:
    #    key: ${CLUSTER}/influx
    #  rewrite:
    #    - regexp:
    #        source: "(.*)"
    #        target: "INFLUX_$1"
    #- extract:
    #    key: ${CLUSTER}/openid/grafana
    #- extract:
    #    key: ${CLUSTER}/cloudnative-pg
