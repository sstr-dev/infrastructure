---
# yaml-language-server: $schema=https://schemas.sstr.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: unpoller
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: unpoller-secret
    template:
      data:
        #UP_UNIFI_DEFAULT_API_KEY: "{{ .UP_UNIFI_API_KEY }}"
        UP_UNIFI_DEFAULT_URL: "{{ .UP_UNIFI_DEFAULT_URL }}"
        UP_UNIFI_DEFAULT_USER: "{{ .UP_UNIFI_USER }}"
        UP_UNIFI_DEFAULT_PASS: "{{ .UP_UNIFI_PASS }}"
  dataFrom:
    - extract:
        key: ${CLUSTER}/unifi
