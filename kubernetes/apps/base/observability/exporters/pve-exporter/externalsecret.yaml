---
# yaml-language-server: $schema=https://schemas.sstr.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name pve-exporter
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: *name
    creationPolicy: Owner
    template:
      data:
        pve.yml: "{{ .pve_exporter }}"
  dataFrom:
    - extract:
        key: ${CLUSTER}/observability/config

