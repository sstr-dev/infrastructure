---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-gateway
spec:
  interval: 1h
  path: ./kubernetes/apps/base/network/envoy-gateway
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: envoy-config
spec:
  dependsOn:
    - name: certificates-import
    - name: envoy-gateway
  interval: 1h
  path: ./kubernetes/apps/${CLUSTER}/network/envoy-gateway
  postBuild:
    substitute:
      CLUSTER: ${CLUSTER}
      EXTERNAL_DOMAIN: external-${CLUSTER}
      #INTERNAL_DOMAIN: internal-${CLUSTER}
      REPLICAS: "1"
      SVC_GATEWAY_EXTERNAL: 10.0.60.50
      # SVC_GATEWAY_INTERNAL: 10.0.60.55
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
