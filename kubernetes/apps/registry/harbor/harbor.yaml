---
# yaml-language-server: $schema=https://datreeio.github.io/CRDs-catalog/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: harbor
spec:
  interval: 1h
  path: ./kubernetes/apps/${CLUSTER}/harbor/harbor
  prune: true
  postBuild:
    substitute:
      CLUSTER: ${CLUSTER}
      HARBOR_INT_IPV4: 10.0.60.51
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings
      - kind: Secret
        name: cluster-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  wait: false
