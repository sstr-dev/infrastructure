---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Bulk Merge PRs"

on:
  workflow_dispatch:
    inputs:
      dryRun:
        description: Dry Run
        default: "false"
        required: false
      ignoreMergeErrors:
        description: Ignore Merge Errors
        default: "false"
        required: false
      labels:
        description: Labels
        default: "any"
        required: false

jobs:
  bulk-merge-prs:
    name: Bulk Merge PRs
    #runs-on: home-ops-runner
    runs-on: ubuntu-latest
    steps:
      - name: Early exit if not gznzeus
        if: ${{ github.event.sender.login != 'gznzeus' }}
        run: |
          echo "Not gznzeus, exiting early."
          exit 0
      - name: Generate Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: "${{ secrets.BOT_APP_ID }}"
          private-key: "${{ secrets.BOT_APP_PRIVATE_KEY }}"

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: "${{ steps.app-token.outputs.token }}"

      - name: Merge
        shell: bash
        env:
          GITHUB_TOKEN: "${{ steps.app-token.outputs.token }}"
        run: |
          args=()
          args+=(--state open)
          args+=(--search "-label:hold")
          args+=(--search "-label:type/major")
          if [ "${{ github.event.inputs.labels }}" != "any" ]; then
              IFS=',' read -ra labels <<< "${{ github.event.inputs.labels }}"
              for label in "${labels[@]}"; do
                  args+=(--label "${label}")
              done
          fi

          while IFS=$'\t' read -r id title; do
              [ -n "${id}" ] || continue
              echo "Processing PR #${id}: ${title}"

              if [ "${{ github.event.inputs.dryRun }}" = "true" ]; then
                  echo "Dry run: gh pr merge ${id} --squash"
                  continue
              fi

              if ! gh pr merge "${id}" --squash; then
                  if [ "${{ github.event.inputs.ignoreMergeErrors }}" = "true" ]; then
                      echo "Merge failed for PR #${id}, continuing because ignoreMergeErrors=true."
                      sleep 2
                      continue
                  fi

                  echo "Merge failed for PR #${id}, stopping workflow."
                  exit 1
              fi

              sleep 2
          done < <(gh pr list "${args[@]}" --json number,title --jq '.[] | "\(.number)\t\(.title)"')
