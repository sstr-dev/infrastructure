---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name authentik
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: *name
    template:
      data:
        # Authentik DBs
        AUTHENTIK_POSTGRESQL__HOST: postgres-cluster-rw.database.svc.cluster.local
        AUTHENTIK_POSTGRESQL__PORT: "5432"
        AUTHENTIK_POSTGRESQL__NAME: authentik
        AUTHENTIK_POSTGRESQL__USER: authentik
        AUTHENTIK_POSTGRESQL__PASSWORD: '{{ .sql_authentik }}'
        AUTHENTIK_POSTGRESQL__USE_PGBOUNCER: "false"
        AUTHENTIK_POSTGRESQL__SSLMODE: "require"
        AUTHENTIK_REDIS__HOST: dragonfly-authentik
        AUTHENTIK_REDIS__DB: '1'
        # Authentik bootstrap
        AUTHENTIK_BOOTSTRAP_EMAIL: '{{ .AUTHENTIK_EMAIL }}'
        AUTHENTIK_BOOTSTRAP_PASSWORD: '{{ .AUTHENTIK_PASSWORD }}'
        AUTHENTIK_BOOTSTRAP_TOKEN: '{{ .AUTHENTIK_TOKEN }}'
        AUTHENTIK_SECRET_KEY: '{{ .AUTHENTIK_SECRET_KEY }}'
        # Authentik email
        AUTHENTIK_EMAIL__HOST: "smtp-relay.default.svc.cluster.local"
        AUTHENTIK_EMAIL__FROM: "SSO <${SECRET_SMTP_FROM_FULL}>"
        AUTHENTIK_EMAIL__USE_SSL: "false"
        AUTHENTIK_EMAIL__PORT: "25"


        # https://docs.goauthentik.io/sys-mgmt/ops/storage-s3/
        # req a public s3 storage

        # AUTHENTIK_STORAGE__MEDIA__BACKEND: "s3"
        # AUTHENTIK_STORAGE__MEDIA__S3__ACCESS_KEY: "${MINIO_ACCESS_KEY}"
        # AUTHENTIK_STORAGE__MEDIA__S3__SECRET_KEY: "${MINIO_SECRET_KEY}"
        # AUTHENTIK_STORAGE__MEDIA__S3__BUCKET_NAME: "${AUTHENTIK_MINIO_BUCKET}"
        # AUTHENTIK_STORAGE__MEDIA__S3__REGION: "${MINIO_REGION}"
        # AUTHENTIK_STORAGE__MEDIA__S3__ENDPOINT: "https://s3.${SECRET_DOMAIN}"
        # AUTHENTIK_STORAGE__MEDIA__S3__CUSTOM_DOMAIN: "s3.${SECRET_DOMAIN}/${AUTHENTIK_MINIO_BUCKET}"


        AUTHENTIK_STORAGE__BACKEND: "s3"
        AUTHENTIK_STORAGE__S3__ACCESS_KEY: '{{ .AUTHENTIK_S3_ACCESS_KEY }}'
        AUTHENTIK_STORAGE__S3__SECRET_KEY: '{{ .AUTHENTIK_S3_SECRET_KEY }}'
        AUTHENTIK_STORAGE__S3__BUCKET_NAME: '{{ .AUTHENTIK_S3_BUCKET_NAME }}'
        AUTHENTIK_STORAGE__S3__ENDPOINT: '{{ .AUTHENTIK_S3_ENDPOINT }}'
        AUTHENTIK_STORAGE__S3__REGION: '{{ .AUTHENTIK_S3_REGION }}'
        AUTHENTIK_STORAGE__S3__CUSTOM_DOMAIN: "{{ .AUTHENTIK_S3_CUSTOM_DOMAIN }}"
        #AUTHENTIK_STORAGE__MEDIA__BACKEND: "s3"
        #AUTHENTIK_STORAGE__MEDIA__S3__ACCESS_KEY: '{{ .AUTHENTIK_S3_ACCESS_KEY }}'
        #AUTHENTIK_STORAGE__MEDIA__S3__SECRET_KEY: '{{ .AUTHENTIK_S3_SECRET_KEY }}'
        #AUTHENTIK_STORAGE__MEDIA__S3__BUCKET_NAME: '{{ .AUTHENTIK_S3_BUCKET_NAME }}'
        #AUTHENTIK_STORAGE__MEDIA__S3__ENDPOINT: '{{ .AUTHENTIK_S3_ENDPOINT }}'


  dataFrom:
    - extract:
        key: ${CLUSTER}/authentik
    - extract:
        key: ${CLUSTER}/pg-users
      rewrite:
        - regexp:
            source: "(.*)"
            target: "sql_$1"
